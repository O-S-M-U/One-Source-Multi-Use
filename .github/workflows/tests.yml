name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 기본 회귀 테스트 — stub embedder, 외부 의존성 0 ──────
  tests-stub:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run regression (stub embedder)
        env:
          PYTHONPATH: src
          OSMU_EMBEDDER: stub
        run: python tests/test_basic.py

  # ── 실 Neon PostgreSQL 통합 테스트 — secret 있을 때만 ──
  tests-postgres:
    runs-on: ubuntu-latest
    # OSMU_DATABASE_URL secret 가 등록된 경우에만 실행
    if: ${{ vars.OSMU_HAS_DATABASE_URL == 'true' || vars.OSMU_HAS_DATABASE_URL == '1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (+ psycopg/pgvector)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install 'psycopg[binary]>=3.1' pgvector
      - name: Run with real Postgres (Neon test branch)
        env:
          PYTHONPATH: src
          OSMU_EMBEDDER: stub
          OSMU_DATABASE_URL: ${{ secrets.OSMU_DATABASE_URL }}
        run: python tests/test_basic.py

  # ── 안전망 — postgres job 이 secret 없어 skip 됐어도 stub 은 반드시 통과해야 머지 가능 ──
  required:
    runs-on: ubuntu-latest
    needs: [tests-stub]
    steps:
      - name: All required checks passed
        run: echo "✅ tests-stub passed across Python 3.10/3.11/3.12 + macOS"
